name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Injecter la clé API
        run: |
          echo "const APP_CONFIG = { API_KEY: '${{ secrets.GEMINI_API_KEY }}' };" > config.js
          cat config.js

      - name: Vérifier les fichiers
        run: ls -la

      - name: Deploy sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
